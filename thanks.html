<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt hàng thành công — Tiếng Trung Hoàng Diễm</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init','1518933582936427');
    fbq('track','PageView');
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Roboto',sans-serif;background:linear-gradient(180deg,#f8f9fa 0%,#e9ecef 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:20px;padding:36px 24px;max-width:440px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.08)}

    .icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;color:#fff}
    .icon-success{background:linear-gradient(135deg,#43a047,#66bb6a);box-shadow:0 4px 20px rgba(67,160,71,.3)}
    .icon-pending{background:linear-gradient(135deg,#ff9800,#ffc107)}
    .icon-cancel{background:linear-gradient(135deg,#e53935,#ef5350)}
    .icon-loading{background:linear-gradient(135deg,#5c6bc0,#7986cb)}

    h1{font-size:22px;color:#222;margin-bottom:6px}
    .highlight{color:#ee4d2d;font-weight:700}
    p{font-size:14px;color:#555;line-height:1.7;margin-bottom:10px}
    .pkg-info{background:#f0faf7;padding:12px;border-radius:10px;margin:14px 0;font-weight:600;color:#00897b;border:1px solid #b2dfdb;font-size:15px}

    /* ===== DOWNLOAD SECTION — hero CTA ===== */
    .download-hero{margin:20px 0;padding:24px 20px;background:linear-gradient(135deg,#fbe9e7,#fff3e0);border-radius:16px;border:2px solid #ee4d2d}
    .download-hero h3{font-size:18px;color:#c62828;margin-bottom:8px}
    .download-hero p{font-size:13px;color:#555;margin-bottom:16px}
    .download-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;background:linear-gradient(135deg,#d32f2f,#ee4d2d);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;text-decoration:none;transition:all .25s;box-shadow:0 6px 20px rgba(238,77,45,.35);text-transform:uppercase;letter-spacing:.5px}
    .download-btn:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px rgba(238,77,45,.45)}
    .download-btn:active{transform:translateY(0)}
    .download-btn i{font-size:22px}

    .hub-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;background:linear-gradient(135deg,#00897b,#00695c);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;text-decoration:none;transition:all .25s;box-shadow:0 6px 20px rgba(0,137,123,.35);text-transform:uppercase;letter-spacing:.5px;margin-top:12px}
    .hub-btn:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,137,123,.45)}
    .hub-btn:active{transform:translateY(0)}
    .hub-btn i{font-size:22px}

    /* ===== OWNERSHIP NOTE ===== */
    .ownership-note{background:#e8f5e9;padding:14px 16px;border-radius:10px;margin:16px 0;text-align:left;border:1px solid #c8e6c9}
    .ownership-note p{font-size:13px;color:#2e7d32;margin:0;line-height:1.6}
    .ownership-note i{color:#43a047;margin-right:6px}

    /* ===== LOOKUP NOTE ===== */
    .lookup-note{background:#e3f2fd;padding:14px 16px;border-radius:10px;margin:12px 0;text-align:left;border:1px solid #bbdefb}
    .lookup-note p{font-size:13px;color:#0d47a1;margin:0;line-height:1.6}
    .lookup-note a{color:#1565c0;font-weight:700;text-decoration:underline}
    .lookup-note i{color:#1976d2;margin-right:6px}

    /* ===== OTHER BUTTONS ===== */
    .zalo-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,#0068ff,#0099ff);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:8px;transition:all .2s}
    .zalo-btn:hover{filter:brightness(1.1)}
    .back-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#f5f5f5;color:#555;border:1px solid #ddd;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;margin-top:10px}
    .hotline-box{margin-top:16px;padding:12px;background:#fff3f0;border-radius:10px;border:1px solid #ffccbc}
    .hotline-box p{font-size:13px;color:#555;margin:0}
    .hotline-box a{color:#ee4d2d;text-decoration:none;font-weight:700}
    .note{font-size:12px;color:#999;margin-top:14px}

    .spinner{animation:spin 1s linear infinite;font-size:40px;color:#5c6bc0}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon icon-loading"><i class="fas fa-spinner spinner"></i></div>
    <h1>Đang xác minh thanh toán...</h1>
    <p>Vui lòng chờ trong giây lát</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || 'bạn';
    const pkg = params.get('pkg') || 'Bộ tài liệu tiếng Trung';
    const phone = params.get('phone') || '';
    const orderCode = params.get('orderCode') || '';
    const payosStatus = params.get('status') || '';
    const payosCancel = params.get('cancel');
    const payosCode = params.get('code');
    const orderType = params.get('type') || 'file';

    const card = document.getElementById('card');

    // Book order — simple thank you, no payment verification
    if (orderType === 'book') {
      showBookOrderSuccess();
    } else if (payosCancel === 'true' || payosStatus === 'CANCELLED') {
      showCancelled();
    } else if (payosStatus === 'PAID' || payosCode === '00') {
      verifyAndDeliver();
    } else {
      showPending();
    }

    function showBookOrderSuccess() {
      if (typeof fbq !== 'undefined') {
        const priceMatch = pkg.match(/(\d+)K/);
        const val = priceMatch ? parseInt(priceMatch[1]) * 1000 : 0;
        fbq('track', 'Purchase', { content_name: pkg, value: val, currency: 'VND' });
      }

      card.innerHTML = `
        <div class="icon icon-success"><i class="fas fa-check"></i></div>
        <h1>Cảm ơn bạn đã đặt hàng! 🎉</h1>
        <p>Xin chào <span class="highlight">${esc(name)}</span>, đơn hàng tài liệu in sẵn của bạn đã được ghi nhận thành công.</p>
        <div class="pkg-info">📦 ${esc(pkg)}</div>

        <div class="ownership-note" style="background:#fff3e0;border-color:#ffe0b2;">
          <p><i class="fas fa-truck" style="color:#e65100"></i> Tài liệu sẽ được <strong>giao về tận nhà</strong> trong <strong>2-4 ngày làm việc</strong>. Chúng tôi sẽ liên hệ qua số điện thoại <strong>${esc(phone)}</strong> để xác nhận đơn hàng.</p>
        </div>

        <div class="ownership-note" style="background:#e8f5e9;border-color:#c8e6c9;">
          <p><i class="fas fa-shield-alt" style="color:#43a047"></i> <strong>Cam kết:</strong> Thanh toán khi nhận hàng (COD). Kiểm tra hàng trước khi thanh toán. Không hài lòng — hoàn tiền 100%.</p>
        </div>

        <a href="https://zalo.me/0528786710" class="zalo-btn" target="_blank">
          <i class="fas fa-comment-dots"></i> Chat Zalo nếu cần hỗ trợ
        </a>

        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>

        <div class="hotline-box">
          <p><i class="fas fa-phone"></i> Hotline: <a href="tel:0528786710">0528786710</a></p>
        </div>
      `;
    }

    async function verifyAndDeliver() {
      try {
        const res = await fetch(`/api/verify-payment?orderCode=${encodeURIComponent(orderCode)}&pkg=${encodeURIComponent(pkg)}`);
        const data = await res.json();
        if (data.status === 'PAID' && data.downloadUrl) {
          showSuccess(data.downloadUrl, data.packageName || pkg, data.password, data.pkgId);
        } else if (data.status === 'PAID') {
          showSuccessNoLink();
        } else {
          showPending();
        }
      } catch (err) {
        console.error('Verify error:', err);
        showSuccessNoLink();
      }
    }

    function showSuccess(downloadUrl, packageName, password, pkgId) {
      // FB Pixel: Purchase
      if (typeof fbq !== 'undefined') {
        const priceMatch = pkg.match(/(\d+)K/);
        const val = priceMatch ? parseInt(priceMatch[1]) * 1000 : 0;
        fbq('track', 'Purchase', { content_name: pkg, value: val, currency: 'VND' });
      }

      // Tự động mở khóa trên trình duyệt hiện tại
      if (pkgId) {
        localStorage.setItem('hub_' + pkgId, password ? password.toUpperCase() : '1');
      }

      const pwBlock = password ? `
        <div class="ownership-note" style="background:#e3f2fd;border-color:#bbdefb;text-align:center;padding:16px;">
          <p style="color:#0d47a1;font-size:14px;margin-bottom:8px">Mật khẩu Kho Tài Liệu của bạn là:</p>
          <div style="font-size:22px;font-weight:900;letter-spacing:2px;color:#1565c0;background:#fff;padding:8px;border-radius:8px;border:2px dashed #90caf9;display:inline-block">${esc(password)}</div>
          <p style="font-size:12px;color:#1976d2;margin-top:8px">Hệ thống đã tự động lưu lại mật khẩu này trên máy của bạn.</p>
        </div>
      ` : '';

      card.innerHTML = `
        <div class="icon icon-success"><i class="fas fa-check"></i></div>
        <h1>Thanh toán thành công! 🎉</h1>
        <p>Cảm ơn <span class="highlight">${esc(name)}</span>! Đơn hàng của bạn đã được xác nhận.</p>
        <div class="pkg-info">📦 ${esc(packageName)}</div>

        ${pwBlock}

        <div class="download-hero">
          <h3>📥 Tài liệu đã sẵn sàng!</h3>
          <p>Nhấn nút bên dưới để lưu file gốc về máy tính/điện thoại.</p>
          <a href="${esc(downloadUrl)}" class="download-btn" target="_blank" rel="noopener">
            <i class="fas fa-cloud-arrow-down"></i> TẢI FILE VỀ MÁY
          </a>

          <div style="background: #e0f7fa; padding: 18px 16px; border-radius: 12px; border: 2px dashed #00acc1; margin-top: 24px; text-align: left;">
            <p style="font-size: 16px; color: #006064; font-weight: 700; margin-bottom: 8px;">
              <i class="fas fa-lightbulb" style="color: #f57f17; font-size: 18px;"></i> LƯU Ý QUAN TRỌNG:
            </p>
            <p style="font-size: 14px; color: #00838f; margin-bottom: 16px; line-height: 1.6;">
              Để <strong>không bao giờ bị thất lạc tài liệu</strong>, những lần học sau bạn không cần tìm lại link này nữa. Hãy truy cập thẳng vào <strong>KHO TÀI LIỆU</strong> của web là có thể xem và học mọi lúc mọi nơi!
            </p>
            <a href="/tailieu" class="hub-btn">
              <i class="fas fa-book-open"></i> VÀO KHO TÀI LIỆU (KHUYÊN DÙNG)
            </a>
          </div>
        </div>

        <div class="lookup-note">
          <p><i class="fas fa-comment-dots"></i> Nếu bị thất lạc link, hãy nhắn <strong>Zalo 0528786710</strong> kèm <strong>SĐT mua hàng</strong> để shop gửi lại link cho bạn.</p>
        </div>

        <a href="https://zalo.me/0528786710" class="zalo-btn" target="_blank">
          <i class="fas fa-comment-dots"></i> Chat Zalo nếu cần hỗ trợ
        </a>

        <div class="hotline-box">
          <p><i class="fas fa-phone"></i> Hotline: <a href="tel:0528786710">0528786710</a></p>
        </div>
      `;
    }

    function showSuccessNoLink() {
      if (typeof fbq !== 'undefined') {
        const priceMatch = pkg.match(/(\d+)K/);
        const val = priceMatch ? parseInt(priceMatch[1]) * 1000 : 0;
        fbq('track', 'Purchase', { content_name: pkg, value: val, currency: 'VND' });
      }

      card.innerHTML = `
        <div class="icon icon-success"><i class="fas fa-check"></i></div>
        <h1>Thanh toán thành công! 🎉</h1>
        <p>Cảm ơn <span class="highlight">${esc(name)}</span>! Đơn hàng đã được xác nhận.</p>
        <div class="pkg-info">📦 ${esc(pkg)}</div>
        <p>Vui lòng nhấn nút Zalo bên dưới, kèm <strong>SĐT mua hàng</strong> để nhận tài liệu ngay.</p>
        <a href="https://zalo.me/0528786710" class="zalo-btn" target="_blank">
          <i class="fas fa-comment-dots"></i> Nhận tài liệu qua Zalo
        </a>
        <div class="hotline-box">
          <p><i class="fas fa-phone"></i> Hotline: <a href="tel:0528786710">0528786710</a></p>
        </div>
      `;
    }

    function showCancelled() {
      card.innerHTML = `
        <div class="icon icon-cancel"><i class="fas fa-times"></i></div>
        <h1>Đơn hàng đã bị huỷ</h1>
        <p>Bạn đã huỷ thanh toán. Nếu đây là nhầm lẫn, bạn có thể quay lại và thử lại.</p>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
        <div class="hotline-box">
          <p><i class="fas fa-phone"></i> Cần hỗ trợ? Gọi: <a href="tel:0528786710">0528786710</a></p>
        </div>
      `;
    }

    function showPending() {
      card.innerHTML = `
        <div class="icon icon-pending"><i class="fas fa-hourglass-half"></i></div>
        <h1>Cảm ơn <span class="highlight">${esc(name)}</span>!</h1>
        <p>Đơn hàng đang xử lý. Vui lòng hoàn tất thanh toán và liên hệ Zalo để nhận tài liệu.</p>
        <div class="pkg-info">📦 ${esc(pkg)}</div>
        <a href="https://zalo.me/0528786710" class="zalo-btn" target="_blank">
          <i class="fas fa-comment-dots"></i> Liên hệ Zalo nhận tài liệu
        </a>
        <div class="lookup-note">
          <p><i class="fas fa-comment-dots"></i> Nhắn <strong>Zalo 0528786710</strong> kèm <strong>SĐT mua hàng</strong> để shop hỗ trợ nhanh nhất.</p>
        </div>
        <div class="hotline-box">
          <p><i class="fas fa-phone"></i> Hotline: <a href="tel:0528786710">0528786710</a></p>
        </div>
        <p class="note">⏰ Xử lý trong vài phút (8h - 22h)</p>
      `;
    }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
  <div style="margin-top: 30px; text-align: center; max-width: 600px;">
    <div style="font-size: 14px; margin: 10px 0; color: #555; line-height: 1.6;">
      <strong>Chủ sở hữu:</strong> Phạm Ngọc Trai<br>
      <strong>Địa chỉ:</strong> Thôn 1, xã Sơn Tây, tỉnh Hà Tĩnh<br>
      <strong>Điện thoại:</strong> 0966025308<br>
      <strong>Email:</strong> ngoctrainh@gmail.com
    </div>
    <div style="font-size: 13px; color: #666; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding-bottom: 20px;">
      <a href="/chinh-sach.html#huong-dan" style="color: #666; text-decoration: none;">Hướng dẫn mua hàng</a>
      <a href="/chinh-sach.html#thanh-toan" style="color: #666; text-decoration: none;">Thanh toán</a>
      <a href="/chinh-sach.html#giao-nhan" style="color: #666; text-decoration: none;">Giao nhận</a>
      <a href="/chinh-sach.html#doi-tra" style="color: #666; text-decoration: none;">Đổi trả</a>
      <a href="/chinh-sach.html#bao-mat" style="color: #666; text-decoration: none;">Bảo mật</a>
    </div>
  </div>
</body>
