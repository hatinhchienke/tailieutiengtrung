<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tra cứu tài liệu — Tiếng Trung Hoàng Diễm</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Roboto',sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e4e9f2 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .logo-section{text-align:center;margin-bottom:24px}
    .logo-section img{width:60px;height:60px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.1)}
    .logo-section h2{font-size:16px;color:#333;margin-top:8px}
    .card{background:#fff;border-radius:16px;padding:32px 24px;max-width:440px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .card h1{font-size:22px;color:#222;margin-bottom:6px;text-align:center}
    .card .subtitle{font-size:14px;color:#777;text-align:center;margin-bottom:24px;line-height:1.5}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
    .form-group input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:'Roboto',sans-serif;transition:border-color .2s;letter-spacing:1px;text-align:center}
    .form-group input:focus{outline:none;border-color:#ee4d2d}
    .form-group input::placeholder{color:#bbb;letter-spacing:0}
    .hint{font-size:12px;color:#999;margin-top:6px;line-height:1.5}
    .hint i{color:#ffa726}
    .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#d32f2f,#ee4d2d);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .submit-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
    .submit-btn:disabled{background:#ccc;cursor:not-allowed;transform:none}
    .submit-btn .fa-spin{animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result{margin-top:24px;padding:20px;border-radius:12px;display:none}
    .result.show{display:block}
    .result-success{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border:2px solid #66bb6a}
    .result-error{background:#fef2f0;border:2px solid #ef9a9a}
    .result-pending{background:#fff8e1;border:2px solid #ffcc80}
    .result h3{font-size:16px;margin-bottom:8px}
    .result p{font-size:13px;color:#555;margin-bottom:10px;line-height:1.6}
    .result .pkg-name{background:#fff;padding:10px;border-radius:8px;font-weight:600;color:#2e7d32;margin-bottom:14px;font-size:14px}
    .download-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:linear-gradient(135deg,#d32f2f,#ee4d2d);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:900;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 15px rgba(238,77,45,.3)}
    .download-btn:hover{filter:brightness(1.1)}
    .zalo-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,#0068ff,#0099ff);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:10px;transition:all .2s}
    .back-link{display:block;text-align:center;margin-top:20px;color:#888;font-size:13px;text-decoration:none}
    .back-link:hover{color:#555}
  </style>
</head>
<body>
  <div class="logo-section">
    <img src="images/avatar.webp" alt="Tiếng Trung Hoàng Diễm">
    <h2>Tiếng Trung Hoàng Diễm</h2>
  </div>

  <div class="card">
    <h1>📋 Tra cứu tài liệu</h1>
    <p class="subtitle">Nhập mã đơn hàng để lấy lại link tài liệu đã mua.<br>Mã đơn hàng nằm trong <strong>nội dung chuyển khoản</strong> trên trang thanh toán.</p>

    <div class="form-group">
      <label for="orderCodeInput">Mã đơn hàng (10 chữ số)</label>
      <input type="text" id="orderCodeInput" placeholder="Ví dụ: 2605051234" inputmode="numeric" maxlength="20" autocomplete="off">
      <p class="hint"><i class="fas fa-info-circle"></i> Đây là dãy số sau chữ "HoangDiem" trong nội dung chuyển khoản.</p>
    </div>

    <button class="submit-btn" id="lookupBtn" onclick="lookupOrder()">
      <i class="fas fa-search"></i> Tra cứu
    </button>

    <div class="result" id="result"></div>
  </div>

  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>

  <script>
    const input = document.getElementById('orderCodeInput');
    const btn = document.getElementById('lookupBtn');
    const result = document.getElementById('result');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') lookupOrder(); });
    input.focus();

    // Pre-fill from URL
    const prefilledCode = new URLSearchParams(window.location.search).get('orderCode');
    if (prefilledCode) { input.value = prefilledCode; lookupOrder(); }

    async function lookupOrder() {
      const orderCode = input.value.trim().replace(/\D/g, '');
      if (!orderCode) { showError('Vui lòng nhập mã đơn hàng'); return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tra cứu...';

      try {
        const res = await fetch(`/api/verify-payment?orderCode=${encodeURIComponent(orderCode)}`);
        const data = await res.json();

        if (data.error) {
          showError(data.error === 'Verification failed'
            ? 'Không tìm thấy đơn hàng với mã này. Vui lòng kiểm tra lại.'
            : data.message || 'Có lỗi xảy ra');
        } else if (data.status === 'PAID' && data.downloadUrl) {
          showSuccess(data.packageName || 'Tài liệu tiếng Trung', data.downloadUrl);
        } else if (data.status === 'PAID') {
          showSuccessFallback();
        } else if (data.status === 'PENDING') {
          showPending();
        } else {
          showError('Đơn hàng chưa được thanh toán hoặc đã hết hạn.');
        }
      } catch (err) {
        showError('Lỗi kết nối. Vui lòng thử lại sau.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-search"></i> Tra cứu';
      }
    }

    function showSuccess(pkgName, downloadUrl) {
      result.className = 'result result-success show';
      result.innerHTML = `
        <h3>✅ Thanh toán đã xác nhận!</h3>
        <div class="pkg-name">📦 ${esc(pkgName)}</div>
        <p><strong>Tài liệu này thuộc quyền sở hữu vĩnh viễn của bạn.</strong> Hãy tải về máy hoặc lưu vào Google Drive.</p>
        <a href="${esc(downloadUrl)}" class="download-btn" target="_blank" rel="noopener">
          <i class="fas fa-cloud-arrow-down"></i> TẢI TÀI LIỆU
        </a>
      `;
    }

    function showSuccessFallback() {
      result.className = 'result result-success show';
      result.innerHTML = `
        <h3>✅ Thanh toán đã xác nhận!</h3>
        <p>Liên hệ Zalo để nhận tài liệu:</p>
        <a href="https://zalo.me/0528786710" class="zalo-btn" target="_blank"><i class="fas fa-comment-dots"></i> Nhận qua Zalo</a>
      `;
    }

    function showPending() {
      result.className = 'result result-pending show';
      result.innerHTML = `
        <h3>⏳ Đang chờ thanh toán</h3>
        <p>Nếu bạn đã chuyển khoản, vui lòng đợi 1-2 phút rồi thử lại.</p>
        <button class="submit-btn" onclick="lookupOrder()" style="margin-top:10px"><i class="fas fa-rotate"></i> Thử lại</button>
      `;
    }

    function showError(msg) {
      result.className = 'result result-error show';
      result.innerHTML = `
        <h3>❌ Không tìm thấy</h3>
        <p>${msg}</p>
        <a href="https://zalo.me/0528786710" class="zalo-btn" target="_blank"><i class="fas fa-comment-dots"></i> Liên hệ hỗ trợ</a>
      `;
    }

    function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  </script>
</body>
</html>
