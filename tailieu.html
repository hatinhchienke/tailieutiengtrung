<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kho Tài Liệu Tiếng Trung — Tiếng Trung Hoàng Diễm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="home.css">
  <style>
    /* DASHBOARD SPECIFIC */
    .h-header-icon { font-size: 20px; color: #ee4d2d; text-decoration: none; padding: 8px; }
    .pw-gate { margin-top: 12px; text-align: center; }
    .pw-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .pw-input { flex: 1; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; background: #f9f9f9; color: #333; font-size: 14px; outline: none; transition: border .2s; }
    .pw-input:focus { border-color: #ee4d2d; }
    .pw-submit { padding: 10px 18px; border: none; border-radius: 10px; background: linear-gradient(135deg, #ee4d2d, #d0011b); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .pw-submit:hover { filter: brightness(1.1); }
    .pw-error { color: #d0011b; font-size: 12px; margin-top: 6px; display: none; }
    .pw-error.show { display: block; animation: shake .4s; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .pw-label { font-size: 12px; color: #555; margin-bottom: 4px; }
    .unlock-area { display: none; margin-top: 12px; text-align: center; }
    .unlock-area.show { display: block; animation: fadeIn .5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .unlock-badge { display: inline-flex; align-items: center; gap: 6px; background: #e8f5e9; color: #2e7d32; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 10px; border: 1px solid #c8e6c9; }
    .download-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; background: linear-gradient(135deg, #2e7d32, #1b5e20); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all .25s; box-shadow: 0 4px 12px rgba(46,125,50,.3); }
    .download-btn:hover { transform: translateY(-2px); }
    .buy-link { display: inline-block; margin-top: 10px; font-size: 12px; color: #0056b3; text-decoration: none; }
    
    /* MODAL LIGHT THEME */
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .detail-overlay.active { display: flex; }
    .detail-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; animation: slideUp .35s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .detail-close { position: sticky; top: 0; z-index: 5; display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: rgba(255,255,255,.95); border-bottom: 1px solid #f0f0f0; backdrop-filter: blur(10px); }
    .detail-close span { font-size: 14px; font-weight: 700; color: #333; }
    .detail-close button { background: #f5f5f5; border: none; color: #555; width: 32px; height: 32px; border-radius: 50%; font-size: 14px; cursor: pointer; }
    .detail-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f9f9f9; }
    .detail-body { padding: 20px 16px; }
    .detail-title { font-size: 18px; font-weight: 800; color: #333; margin-bottom: 6px; }
    .detail-price { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .detail-price .sale { font-size: 20px; font-weight: 800; color: #ee4d2d; }
    .detail-price .old { font-size: 14px; color: #999; text-decoration: line-through; }
    .detail-price .disc { font-size: 11px; background: #ffebee; color: #c62828; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .detail-features { margin-bottom: 20px; }
    .detail-features h4 { font-size: 13px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
    .detail-features li { list-style: none; font-size: 13px; color: #444; padding: 6px 0; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 8px; }
    .detail-features li i { color: #ee4d2d; font-size: 12px; min-width: 16px; }
    .detail-previews { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 20px; }
    .detail-previews img { height: 140px; border-radius: 10px; flex-shrink: 0; border: 1px solid #eee; }
    .detail-social { font-size: 12px; color: #777; text-align: center; margin-bottom: 16px; }
    .detail-divider { height: 1px; background: #eee; margin: 16px 0; }
    
    /* OVERLAYS */
    .h-card-lock-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 12px 12px 0 0; }
    .h-lock-icon { width: 40px; height: 40px; border-radius: 50%; background: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.15); display: flex; align-items: center; justify-content: center; color: #666; font-size: 16px; }
    .h-card { cursor: pointer; position: relative; }
    .h-card-img { position: relative; }
    .h-card-unlocked { position: absolute; bottom: 8px; right: 8px; background: rgba(255,255,255,.9); color: #2e7d32; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.1); z-index: 5; display: flex; align-items: center; gap: 4px; }
    
    /* WELCOME SECTION */
    .t-welcome { padding: 24px 16px; text-align: center; background: #fff; margin-bottom: 8px; }
    .t-welcome h1 { font-size: 20px; font-weight: 800; color: #333; margin-bottom: 8px; }
    .t-welcome p { font-size: 13px; color: #666; margin-bottom: 16px; }
    
    .fade-up { opacity: 0; transform: translateY(24px); transition: all .6s ease-out; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="h-header">
    <div class="h-header-left">
      <img src="images/avatar.webp" alt="Logo" class="h-logo-img">
      <span class="h-logo-text">Tiếng Trung Hoàng Diễm</span>
    </div>
    <a href="/" class="h-header-icon"><i class="fas fa-home"></i></a>
  </header>

  <section class="t-welcome fade-up">
    <h1>Kho Tài Liệu Của Bạn</h1>
    <p>Nhập mật khẩu được cung cấp sau khi thanh toán để mở khóa tài liệu.</p>
  </section>

  <!-- PRODUCT GRID -->
  <section class="h-products">
    <div class="h-grid" id="hubGrid"></div>
  </section>

  <!-- DETAIL MODAL -->
  <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-sheet" id="detailSheet"></div>
  </div>

  { id:'bothu', emoji:'🀄', title:'60 Bộ Thủ Thường Gặp', cover:'ảnh cover sp/60 bộ thủ chữ hán.png',
    priceSale:'39,000₫', priceOld:'100,000₫', discount:'-61%', students:'1.2K+', password:'BT76HOT',
    downloadUrl:'https://drive.google.com/file/d/1cTEl3a0AFVTGKkmcwBOU-1YJiZhHMQV1/view', downloadLabel:'Mở tài liệu 60 bộ thủ',
    desc:'Bộ thủ được ví như bảng chữ cái tiếng Trung — là gốc rễ của chữ Hán. File giải nghĩa 60 bộ thủ thường gặp nhất, giúp nhớ mặt chữ nhanh hơn và lâu hơn.',

];

// Render cards
const grid = document.getElementById('hubGrid');
function renderGrid() {
  grid.innerHTML = '';
  PACKAGES.forEach((p, i) => {
    const isUnlocked = localStorage.getItem('hub_' + p.id) === '1';
    const badgeHtml = p.badge ? '<div class="h-card-badge h-badge-' + p.badge + '">' + p.badgeText + '</div>' : '';
    const lockHtml = isUnlocked 
      ? '<div class="h-card-unlocked"><i class="fas fa-check-circle"></i> Đã mở</div>' 
      : '<div class="h-card-lock-overlay"><div class="h-lock-icon"><i class="fas fa-lock"></i></div></div>';
    
    grid.innerHTML += '<div class="h-card '+(p.featured?'h-card-featured':'')+' fade-up visible" onclick="openDetail(\''+p.id+'\')">' +
      badgeHtml +
      '<div class="h-card-img"><img src="' + p.cover + '" alt="' + p.title + '">' + lockHtml + '</div>' +
      '<div class="h-card-body">' +
      '<h3>' + p.title + '</h3>' +
      '<div class="h-card-price"><span class="h-price-sale">' + p.priceSale + '</span><span class="h-price-old">' + p.priceOld + '</span></div>' +
      '<div class="h-card-meta"><i class="fas fa-star"></i> 4.9 | ' + (isUnlocked ? 'Đã mở khóa' : 'Đã bán ' + p.students) + '</div>' +
      '</div></div>';
  });
}

renderGrid();

// Modal logic
function openDetail(pkgId) {
  const pkg = PACKAGES.find(p => p.id === pkgId);
  const storedVal = localStorage.getItem('hub_' + pkgId);
  const isUnlocked = storedVal !== null;
  
  if (isUnlocked) {
    let dlUrl = pkg.downloadUrl;
    if (pkg.passwords && pkg.passwords[storedVal]) {
      dlUrl = pkg.passwords[storedVal].url;
    }
    window.open(dlUrl, '_blank');
    return;
  }
  
  const featuresHtml = pkg.features.map(f => '<li><i class="fas fa-check-circle"></i>'+f+'</li>').join('');

  const slugMap = { 'full':'tron-bo', 'cautruc':'cau-truc', 'giaotiep':'1200-cau', 'tuvung':'tu-vung', 'luyen':'luyen-go', 'bothu':'60-bo-thu' };

  let accessHtml = '<div class="pw-gate">' +
      '<div class="pw-label"><i class="fas fa-key"></i> Nhập mật khẩu để mở khóa</div>' +
      '<div class="pw-input-row">' +
      '<input type="password" class="pw-input" id="mpw-'+pkgId+'" placeholder="Mật khẩu..." onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();unlockModal(\''+pkgId+'\')}">' +
      '<button class="pw-submit" onclick="event.stopPropagation();unlockModal(\''+pkgId+'\')"><i class="fas fa-unlock"></i> Mở khóa</button>' +
      '</div>' +
      '<div class="pw-error" id="merr-'+pkgId+'"><i class="fas fa-times-circle"></i> Sai mật khẩu! Vui lòng thử lại.</div>' +
      '<a href="/sp/'+slugMap[pkgId]+'" class="buy-link" onclick="event.stopPropagation()"><i class="fas fa-cart-plus"></i> Chưa có mật khẩu? Mua ngay →</a>' +
      '</div>';

  document.getElementById('detailSheet').innerHTML = '<div class="detail-close"><span>'+pkg.emoji+' Mở khóa tài liệu</span><button onclick="closeDetail()"><i class="fas fa-times"></i></button></div>' +
    '<img src="'+pkg.cover+'" class="detail-cover" alt="'+pkg.title+'">' +
    '<div class="detail-body">' +
    '<h2 class="detail-title">'+pkg.title+'</h2>' +
    '<div class="detail-price"><span class="sale">'+pkg.priceSale+'</span><span class="old">'+pkg.priceOld+'</span><span class="disc">'+pkg.discount+'</span></div>' +
    '<p style="font-size:13px;color:#555;line-height:1.6;margin:12px 0 16px;padding:12px;background:#f9f9f9;border-radius:10px;border:1px solid #eee;">'+pkg.desc+'</p>' +
    '<div class="detail-social">Trạng thái: <strong>'+(isUnlocked?'Đã mở khóa':'Đã khóa <i class="fas fa-lock"></i>')+'</strong></div>' +
    '<div class="detail-divider"></div>' +
    accessHtml +
    '<div class="detail-divider"></div>' +
    '<div class="detail-features"><h4><i class="fas fa-list-check"></i> Bao gồm</h4><ul>'+featuresHtml+'</ul></div>' +
    '</div>';
  
  document.getElementById('detailOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  
  if (!isUnlocked) {
    setTimeout(() => { document.getElementById('mpw-'+pkgId)?.focus(); }, 100);
  }
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function unlockModal(pkgId) {
  const pkg = PACKAGES.find(p => p.id === pkgId);
  const input = document.getElementById('mpw-' + pkgId);
  const err = document.getElementById('merr-' + pkgId);
  const val = input.value.trim().toUpperCase();

  let matched = false;
  if (pkg.passwords && pkg.passwords[val]) {
    matched = true;
  } else if (val === (pkg.password || '').toUpperCase()) {
    matched = true;
  }

  if (matched) {
    localStorage.setItem('hub_' + pkgId, val);
    closeDetail();
    renderGrid();
    setTimeout(() => openDetail(pkgId), 100);
  } else {
    err.classList.remove('show'); void err.offsetWidth; err.classList.add('show');
    input.value = ''; input.focus();
  }
}
</script>
</body>
</html>
